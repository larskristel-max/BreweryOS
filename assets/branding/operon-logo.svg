<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="operonLogoTitle operonLogoDesc">
  <title id="operonLogoTitle">Operon logo</title>
  <desc id="operonLogoDesc">Circular Operon mark with metallic ring and accent node.</desc>
  <defs>
    <linearGradient id="operonMetal" x1="120" y1="110" x2="405" y2="402" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1F3F6"/>
      <stop offset="0.28" stop-color="#B8BEC8"/>
      <stop offset="0.58" stop-color="#7D8490"/>
      <stop offset="1" stop-color="#E6E8EC"/>
    </linearGradient>
    <radialGradient id="operonCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 258) rotate(90) scale(170)">
